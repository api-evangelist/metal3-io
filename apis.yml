apis:
- aid: metal3-io:metal3-api
  name: Metal3 BareMetalHost API
  description: >-
    Metal3 extends Kubernetes with the BareMetalHost custom resource for
    managing physical servers. The API supports hardware inventory discovery,
    firmware configuration, BIOS settings, RAID configuration, and OS
    provisioning. Combined with Cluster API, it enables declarative
    management of bare metal Kubernetes clusters.
  humanURL: https://metal3.io/documentation.html
