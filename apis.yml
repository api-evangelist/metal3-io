aid: metal3-io
name: Metal3
description: >-
  Metal3 (Metal Kubed) is a CNCF incubating project that provides bare
  metal host provisioning for Kubernetes. It leverages Ironic for hardware
  management and integrates with the Cluster API to enable Kubernetes-native
  lifecycle management of bare metal infrastructure. Metal3 automates
  server discovery, inspection, provisioning, and deprovisioning using
  Kubernetes custom resources.
url: https://metal3.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Bare Metal
- Provisioning
- Kubernetes
- Infrastructure
- Cloud Native
- Incubating
